  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0021_WYG_002-1a, image: WYG0682/WYG0682-0069a.png}
body:
  text: 法帖譜系卷下宋曹士冕撰絳本舊帖歐陽公集古跋尾謂近時有尚書郎潘師旦以官帖私自模刻于家為别本以行于世又云潘師旦者竊取官法帖中數十帖别自刻石以遺人而傳寫字多轉失然亦有可佳者觀此則絳帖是矣此帖世稱為潘駙馬帖或又稱絳帖豈潘氏世居絳郡耶帖凡二十卷其次序卷帙雖與淳化官帖不同而實則祖之特有少増益耳已别注絳帖字鑑兹得以畧單炳文博雅君子也其論絳帖至為精密頃刻石襄州有云淳化官本法帖今不復多見其次絳帖最佳而舊本亦已艱得嘗以數本較之字畫多不侔煒家藏舊本第九卷大令書一卷第四行内面字右邊轉筆正在石破缺處𨼆然可見今本乃無右邊轉筆全不成字其面字下一字與第五行第七字亦不同又第七行第一字舊本乃行書止字今本乃草書心字筆法且俗以此推之今之所見多非舊本臨江帖大率與舊本同其間此一帖尤不差但字體頗肥不逮絳帖之遒勁也余既獲見炳文絳帖辨証然後知近世所藏二十卷帖多非舊物每恨未識真本而襄州所刻第九卷大令帖亦毁于王旻之變慮其遂至泯絶因以舊所藏本摹刻于家頗傳諸好事者淳祐甲辰自霅川官滿得闕遄歸假道三衢始獲觀真帖于滄州毛監丞所不獨第九卷與單説正合而二十卷首尾俱全亦可謂珍玩矣且云得之金華潘氏是殆師旦之苗裔也其帖之異同大略條列于後姑總二十卷元無字號及段眼數目第二卷鍾繇宣示帖第一行内報字右邊直畫勾起向左畔第二行茤字内下面夕字上畫微仰曲第五行名字右角微有一㸃第十行當字上三㸃全旁有微損却在空處已欲日帖脚下有斷石紋此卷内第一段與第三段石並缺石角第九卷大令帖正與單炳文襄州所刻石本纎微弗差故家所藏未有其比右潘氏絳帖二十卷紙墨字畫模印皆與今人所藏本不同而第九卷顯然可見自非單公炳文表而出之亦將泯於無聞矣北方所刻諸本徃徃南渡後北人轉相傳模無足深怪但武岡舊刻未知始於何年亦止用新本模刻為可恨耳東庫本世傳潘氏析居法帖石分而為二其後絳州公庫乃得其一於是補刻餘帖是名東庫本第九卷之舛誤葢始乎此今好事之家所藏絳帖率多此本字畫精神遒勁亦自可愛而衛夫人一帖及宋儋帖頗多燥筆有如蘭亭敘羣字落筆之類此稍異於諸本其所以不及舊帖者以第九卷大令書石不破缺而炳所論三字已誤且逐卷逐段各分字號以日月光天徳山河壯帝居太平何以報願上登封書為别此又異於舊帖也亮字不全本此帖與東庫本絶相似或只是一石但庾亮帖内亮字皆無右邊轉筆葢避金主諱也新絳本右一帖二十卷首尾規模段眼字號並同東庫本獨衛夫人宋儋二帖無燥筆又字畫較東庫本微局促墨法雖與東庫本同然實是兩石吾家與毛希元皆有之北本右二十卷親戚劉用甫處有之墨色與古本相近而第九卷大令書只同新本未知何處所刻又一本董良史家所藏本第九卷大令書字畫亦誤獨面字有右邊轉筆異於他本且不與舊本同也武岡舊本右二十卷不知刻於何時碑段稍長而日月光天徳等字號間於行中字畫亦清勁可愛而第一卷衛夫人宋儋無枯筆第九卷大令帖諸子皆誤信乎出於新絳也武岡新帖右二十卷帖即舊石也中厄於庸謬之人厭其字畫清瘦頗修治遂失本真其最可鄙笑者又第二卷鍾繇帖内再世榮名今名字已修作谷字矣且拓匠不工凡損剥處鑿痕宛然呈露而字畫模糊略不可辨帖之謬者莫甚於此福清本詳見淳化帖條下烏鎮本詳見淳化帖條下此乃板本非石也長沙折府所藏二十卷模刻頗精疑是此本第九卷復面帖字誤而鵝羣帖止是微損字畫尚完此稍異於新絳彭州本掘地得之字畫清勁頗類舊武岡而差優予家有之資州本資州以新絳前十卷刻石予家多有之前有目録元刻麻石上續拓者不逮舊所得本遒勁矣木本前十卷甲秀陳氏藏此墨本不知所出又木本前十卷右一帖頃獲于都下不知所出稍不逮甲秀所藏雖皆出於新絳然亦自是一種法帖譜系卷下
