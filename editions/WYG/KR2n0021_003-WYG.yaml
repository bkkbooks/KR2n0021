seq: 3
front:
  text: 余酷耆古學留意法書名跡幾三十年頗以鑒賞自居賞集前賢文集小説法帖之説為考一卷以便檢閲淳祐甲辰冬因侍陶齋曹公相與稽訂法書源流多所未聞他日出示譜系一編曰視子所記如何予曰博矣迺請而刻之梓東湖董史書
  hash: sha256:a3c6717084f3811208a192dc0a006d4842b125b47ea2c2216d87074e72f43c0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0021_WYG_003-1a, image: WYG0682/WYG0682-0072a.png}
body:
  text: 庚申冬鄰火煽虐潛心閣殱焉初余頗惜此板不以他板雜特儲之閣逮是他板獲免秦禍而譜系反為熒惑下取豈固有數耶余藏書滿閣古帖名碑秘之寳刻藏中一旦滅没於漲天之烟焰生平目力事力心力為之一空恨鬱無已幾成怨天雖然天其可怨耶因念曩與谷中校讎參訂以成此書谷中已矣書可共傳遂訪舊本於友間欲復板而行之月樵劉氏慨然授所藏俾就此志嗟夫予家名跡已如夢幻誅茅葢頭政以為窘顧切切於不急之務痼疾尚堪療哉板成載誌之末時則景定壬戌夏五月也史跋
  hash: sha256:d6254add4ceb05da0675f170f2093f1cadf1a9f99cf06ad61e3b77436c88970b
