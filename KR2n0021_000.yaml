  text: 欽定四庫全書史部十四
  hash: sha256:1b0fee061afb4650a390a33f011206c9ad39b5a17ebb7b4f5e965df0aa8e4e0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0021_WYG_000-1a, image: WYG0682/WYG0682-0061a.png}
body:
  text: 法帖譜系目錄類二金石之屬提要臣等謹案法帖譜系二卷宋曹士冕撰考書史㑹要士冕字端可號陶齋昌谷之後昌谷為曹彦約别號則都昌人也其仕履無考惟三山木板帖條下自稱三山帥司庫有厯代帖板本嘉熙庚子備員帥幕尚及見之之語絳本舊帖條下有淳祐甲辰霅川官滿之語葢由幕僚而仕州郡者耳其書序宋代法帖源流首為譜系圖上卷淳化法帖以下為二王府帖紹興國子監本淳熙修内司本大觀太清樓帖臨江戲魚堂帖利州帖慶厯長沙帖劉丞相私第本長沙碑匠家本長沙新刻本三山木板黔江帖北方印成本烏鎮本福清本澧陽帖鼎帖不知處本長沙别本蜀本廬陵蕭氏本凡二十二種下卷綘本舊帖以下為東庫本亮字不全本新綘本北本又一本武岡舊本武岡新本福清本烏鎮本彭州本資州本木本前十卷又木本前十卷凡十四種蓋以淳化閣帖為大宗而綘帖為别子諸本皆其支派也每條叙述摹刻始末兼訂其異同工拙頗足以資考證書史㑹要稱士冕博叅書法服習蘭亭宜其鑒别不苟矣古今法帖皆搨本惟此書載有印本法帖亦廣異聞書成於淳祐乙巳前有自序以書中自記考之蓋霅川官滿之第二年也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀法帖譜系原序魏晉真墨世不多見故家大室號為收書者所藏間不過一二外此率多臨摹響榻徃徃失真無復古意去古益逺雖石刻亦復艱得秦漢豐碑巨碣唯字畫深且大者僅存雖日就剥落而尚或髣髴可辨至如晉宋諸刻幾一字不可攷矣可勝嘆哉恭惟藝祖皇帝承五季分裂之餘平一天下諸國賓服文書禮樂復見全盛太宗皇帝文徳化成淳化中盡取御府歴代名蹟刻之秘閣毎大臣登進二府則賜之於是魏晉書法傳布天下閣帖之名葢始乎此自是好事者轉相傳摹而又増益他帖别為卷第如絳帖潭帖之類枝分派别不知其幾世之得其一二者未暇詳攷徃徃自為珍異此是彼非莫知底止余生最晚自幼粗知崇慕書學第識見淺陋所得不廣淳化古帖恨未識真近世所藏率是贗本絳帖家藏數種雖有同異並皆中原新刻近嵗始獲見古本于三衢好事家然後知單公炳文之論不我欺也因取平生所見諸帖列成譜系以備遺忘若夫攷訂不盡紀載未備尚俟博雅君子矜我者是正而増廣之曹士冕序法帖譜系圖凡圈者自成一𣲖
