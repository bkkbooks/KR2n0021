front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0021_WYG_001-1a, image: WYG0682/WYG0682-0064a.png}
body:
  text: 法帖譜系卷上宋曹士冕撰淳化法帖熙陵以武定四方載櫜弓矢文治之餘留意翰墨乃出御府所藏歷代真迹命侍書王著模刻禁中釐為十卷各於卷尾篆書題云淳化三年壬辰嵗十一月六日奉聖旨模勒上石敘説太宗皇帝時常遣使購募前賢真迹集為法帖十卷鏤板而藏之每有大臣進登二府賜以一本其後不賜或傳板本在御書院往時禁中火災板焚遂不復賜或云板今在但不賜爾故人間尤以官法帖為難得余自薛公期云是家藏舊本今世人所有皆轉相傳模者也六一集古太宗皇帝文德化成靖無他好留意翰墨潤色太平嘗借王氏所收書以集閣帖十卷內郗愔兩行二十四日帖乃此卷中者而於謝公帖親跋三字以還王氏其帖在李瑋家寶晉太宗皇帝萬機之餘留情翰墨嘗詔天下購募鍾王真迹集為法帖十卷模刻以賜羣臣往時故相劉公沆在長沙以官法帖鏤板遂布於人間後有尚書郎潘師旦又擇其尤妙者别為卷第與劉氏本並行至豫集録古文不敢輒以官本參入私集遂於師旦所傳又取其尤者散入録中俾夫啓帙披卷者時一得之把玩欣然所以忘倦也集古二王府帖山谷論禁中板刻古法帖十卷當時皆用歙州貢墨墨本賜羣臣今都下用錢萬二千便可購得元祐中親賢宅從禁中借板墨百本分遺宫僚但用潘谷墨光輝有餘而不甚黟黑又多木橫裂紋士大夫不能盡别也此本可當舊板之半耳豫觀近世所謂二王府帖者蓋中原再刻石本非禁中板本也前有目録卷尾且無篆書題字蓋顯然二物矣紹興國子監本紹興中以御府所藏淳化舊帖刻板置之國子監其首尾與淳化閣本略無少異當時御府拓者多用匱紙蓋打金銀箔者也字畫精神極有可觀今都下亦時有舊拓者元板尚存邇來碑工往往作蟬翼本且以厚紙覆板上隱然為銀錠痕以惑人第損剝非復舊拓本之遒徑矣淳熙修內司本淳熙間奉旨刻石禁中卷帙規模悉同淳化閣本而卷尾乃楷書題云淳熙十二年乙巳嵗二月十五日修內司恭奉聖旨模勒上石大觀太清樓帖大觀中奉旨刻石太清樓字行稍髙而先後之次亦與淳化帖小異其間有數帖多寡不同或疑用真迹摹刻凡標題皆蔡京所書卷尾題云大觀三年正月一日奉聖旨模勒上石而又以建中靖國祕閣續帖十卷易其標題去其嵗月與官屬名銜以為後帖又刻孫過庭草書譜及貞觀十七帖總為二十二卷吾家收宣政間所拓前十卷字畫有鋒芒且無損缺開禧以後有𣙜場中來者已磨去亮字矣臨江戲魚堂帖元祐間劉次莊以家藏淳化閣帖十卷摹刻堂上除去卷尾篆題而增釋文故家所藏往年拓本猶有典刑近所拓者字多刓缺亦有補換新刻者矣利州本慶元中四川總領權安節以戲魚帖并釋文重刻石于益昌官舍石今已不存權總江州德安人其家猶有當時墨本甚多釋文字畫較臨江帖為稍大慶厯長沙帖丞相劉公沆帥潭日以淳化官帖命慧照大師希白模刻于石置之郡齋增入霜寒十七日王濛顔真卿等諸帖而字行頗髙與淳化閣本差不同逐卷各有嵗月第一卷題云慶厯五年季夏慧照大師希白模勒第二卷慶厯八年仲冬月慧照大師希白重模第三卷則五年六月第四卷八年仲冬月第五卷戊子嵗孟冬第六卷五年季夏第七卷五年仲秋月第八卷五年季夏月模勒上石第九卷八年仲冬月第十卷五年仲秋月每卷各有慶厯及慧照大師希白重模字不復贅録劉丞相私第本劉丞相既刻法帖于郡齋復依倣前本刻石十卷以歸私第豫頃在九江見故家所藏一本與長沙本絶相似而小異其後有人跋云此先丞相私第本也疑是劉氏子弟所跋後復見一本于姑蘇與九江所見本同紙墨皆與南碑不類而慶厯等題字止三兩卷有之蓋即劉氏本也長沙碑匠家本舊傳長沙官本扄鑰不可常得碑匠之家别刻一本以應求者豫頃收一本與長沙古本首尾略無小異而字體形模小小不同疑其為碑匠家本頃又藏一本凡舊石損缺者皆别刻數行以易之其餘却只是舊石此必碑匠所為也長沙新刻本舊刻毁于鬱攸之變中興以後復刻新石其間凡遇舊帖損缺處並不復刻字亦無卷尾歲月刻手甚繆殊不足觀三山木板三山帥司書庫有歷代帖板本蓋好事者倣長沙舊帙刋勒卷帙規模皆同今已散失不全矣嘉熙庚子備員帥幕尚及見之黔江帖秦子明常以里中兒不能書為病其將兵於長沙也買石摹刻僧寶月古法帖十卷謀舟載入黔江壁之黔江之紹聖院刻石者潭人湯正臣父子詳見山谷集中豫淳祐甲辰道過三衢見好事家適有此帖其卷帙之多寡次序之先後字行之長短悉同淳化閣帖而紙墨髣佛似戲魚堂中興以前拓本其所以異者第一卷有淳化篆書三行其次有楷書一行云降授供備庫副使充東南第八副將訓練潭州諸軍潭州駐劄秦世章家本其後又二行云長沙湯正臣重模男仙芝靈芝鐫第二卷至八卷尾各題長沙湯正臣重模勒八字却無淳化篆書及世章䘖位又第八卷取卿女壻帖內第二行休字立人作兩點第二卷鍾繇宣示帖內再世榮名作榮石正與戲魚帖同第九卷尾題長沙湯正臣摹七字第十卷題長沙人湯正臣重摹男仙芝為一行此下似别有字偶裁損不可考矣北方印成本余頃歲道過臨川時李編修伯髙宰是邑出所藏法帖見示乃板本印成者是北地厚皮紙印每段自成一板四圍皆空白紙不施筐緣裝表而自然整齊成册字畫亦甚可愛烏鎮本舊傳湖州烏鎮張氏以絳閣二帖鋟木家孰或遇良工模拓亦有可觀後聞板歸新市人家每連紙一幅可打一段豫在三山見一本于周氏後數卷板內時有直裂紋比到霅上獲一本於向氏叔堅之裔偶缺兩卷且以元祐間所拓戲魚帖足之此刻字畫差肥而極有筆意頗勝諸帖惜其間錯誤數字為恨耳趙宰叔愚曰丙戌歲在宗庠有以法帖板質于齋舍族人者偶不記為何人疑是此板亦未可知福清本福州福清縣民家有舊本板刻絳閣急就章鴈塔題名四帖其刻稍精賣碑家得之往往駕名官帖以惑人但彼中匠者不善用蠟每每有砑光痕可以證驗澧陽帖澧陽舊有法帖石本其後散失僅存者右軍數帖而已鼎帖武陵郡齋板本較諸帖增益最多博而不精殊無足取不知處本豫章士友董良史家有法帖拓本數卷與淳化帖規模相似而筆意差弱似不逮所見諸本且不知所出姑識于此以俟識者長沙别本嘉定間先君帥長沙豫隨侍在焉時碑房中有斷石一片乃法帖第一卷尾段字行髙低正與淳化帖同而絶不類古潭末後亦有淳化篆字此石實不知所從來近歲三山林伯鳳重刻于家直指為古潭帖余未敢臆斷也蜀本豫頃得一帖凡數卷于蜀中次序先後髙低皆與長沙古帖同初亦疑為黔江帖今見秦氏真本則顯然二物矣大率此帖全用長沙古本摹刻而字行亦間有增減處既不知所出未敢臆説姑附見于此廬陵蕭氏本右法帖十卷用十干為號後崇寧五年蕭公論記其略云皇祐先伯父大博作邑和州之含山得墨帖於丞相兖國劉公摹刻未畢先君殿丞繼之始終六年乃獲成就迄今五十餘年刓缺大半今續完之以藏于家蓋用潭帖刻也慶元間已損失二十餘段共少三百四十餘行法帖譜系卷上
