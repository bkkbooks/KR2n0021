seq: 3
front:
  text: 余酷耆古學留意法書名迹幾三十年頗以鑒賞自居賞集前賢文集小説法帖之説為考一卷以便檢閲淳祐甲辰冬因侍陶齋曹公相與稽訂法書源流多所未聞他日出示譜系一編曰視子所記如何豫曰博矣乃請而刻之梓東湖董史書
  hash: sha256:5f76f08cc86124355517d2092ac426e0af26a5e15de08ef1262e40d1bbb18f43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0021_WYG_003-1a, image: WYG0682/WYG0682-0072a.png}
body:
  text: 庚申冬鄰火煽虐潛心閣殱焉初余頗惜此板不以他板雜特儲之閣逮是他板獲免秦禍而譜系反為熒惑下取豈固有數耶余藏書滿閣古帖名碑祕之寶刻藏中一旦滅沒於漲天之煙焰生平目力事力心力為之一空恨鬱無已幾成怨天雖然天其可怨耶因念曩與谷中校讎參訂以成此書谷中已矣書可共傳遂訪舊本於友間欲復板而行之月樵劉氏慨然授所藏俾就此志嗟夫豫家名迹已如夢幻誅茅蓋頭政以為窘顧切切於不急之務痼疾尚堪療哉板成載志之末時則景定壬戌夏五月也史跋
  hash: sha256:e4d6f2b9cfb06d1f46fa0469bf6b5d6e5b16c97d5a65ca2114435be2c9ea6e9e
